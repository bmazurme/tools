server {
  listen 80;

  server_name localhost;
  # underscores_in_headers on;

  gzip                on;
  gzip_vary           on;
  gzip_proxied        any;
  gzip_comp_level     6;
  gzip_min_length     1000;
  gzip_buffers        4 8k;
  gzip_http_version   1.1;
  gzip_disable        "msie6";
  gzip_types          text/plain text/css text/xml text/javascript
                      application/json application/javascript application/x-javascript
                      application/xml application/xml+rss application/wasm application/vnd.ms-fontobject
                      image/svg+xml
                      font/ttf font/otf font/woff font/woff2;

  location / {
    root /usr/share/nginx/html;
    index index.html index.htm;
    try_files $uri $uri/ /index.html;

    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # Хешированные бандлы из dist/assets — имя меняется при изменении содержимого,
  # поэтому их можно кешировать "навсегда".
  location ^~ /assets/ {
    root /usr/share/nginx/html;
    expires 1y;
    add_header Cache-Control "public, immutable, no-transform";
  }

  # Прочие статические файлы (favicon, svg-логотипы и т.д.) не хешируются,
  # поэтому даём более короткий кеш без immutable, чтобы обновления подхватывались быстрее.
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|eot|otf)$ {
    root /usr/share/nginx/html;
    expires 7d;
    add_header Cache-Control "public, no-transform";
  }

  # location /api/ {
  #   proxy_pass http://host.docker.internal:3000;
  #   proxy_http_version 1.1;
  #   proxy_set_header Upgrade $http_upgrade;
  #   proxy_set_header Connection 'upgrade';
  #   proxy_set_header Host $host;
  #   proxy_cache_bypass $http_upgrade;
  #   proxy_set_header X-Auth $http_x_auth;  # Регистр важен!
  # }
}
